<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found — KGR Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        kgr: {
                            blue: '#1a237e',
                            cyan: '#00e5ff',
                            black: '#1A1A1A',
                            dark: '#000000',
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="bg-white text-slate-900 font-['Inter'] flex items-center justify-center min-h-screen">
    <div class="text-center space-y-8 px-6">
        <h1 class="text-9xl font-bold text-kgr-cyan opacity-20">404</h1>
        <div class="space-y-4">
            <h2 class="text-3xl font-bold">Something went wrong.</h2>
            <p class="text-slate-600 max-w-sm mx-auto">The page you're looking for doesn't exist or has been moved.</p>
        </div>
        <a href="/kgr-rebuild/" class="inline-block px-8 py-4 bg-slate-900 text-white rounded-2xl font-bold hover:bg-kgr-cyan transition">Back to Home</a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const toggle = document.getElementById('mobile-menu-toggle');
            const menu = document.getElementById('mobile-menu');
            const close = document.getElementById('mobile-menu-close');
            const overlay = document.getElementById('mobile-overlay');
            
            function openMenu() {
                menu.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            }
            function closeMenu() {
                menu.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
                document.body.style.overflow = '';
            }
            
            if (toggle) toggle.addEventListener('click', openMenu);
            if (close) close.addEventListener('click', closeMenu);
            if (overlay) overlay.addEventListener('click', closeMenu);
            
            // Close on nav link click
            menu.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', closeMenu);
            });
        });
    </script>
</body>
</html>
